# Plugin name: malcure-intrusion-prevention-plugin
# Plugin description: Proactively blocks malicious IPs to prevent brute-force attacks and exploitation attempts by monitoring error responses in ModSecurity without relying on external tools like Fail2Ban etc.
# Rule ID block base: 9,600,000 - 9,600,999
# Plugin version: 1.3.0

# ================================================================================
# Exempt private and loopback IPs (IPv4 and IPv6)
# {Useful because WordPress Cron, PageSpeed Module etc. make local requests which can result in 404 etc.}
# This rule matches requests coming from private/internal IP addresses (IPv4 and IPv6).
# If the REMOTE_ADDR matches the regex for private IP ranges, the rule triggers.
# Action 'ctl:ruleRemoveById=9600010-9600999' removes the specified rules for this transaction,
# effectively exempting these IPs from the intrusion prevention logic.
# IPv4 private ranges: 127.x, 10.x, 192.168.x, 172.16-31.x
# IPv6 private ranges: ::1 (loopback), fe80:: (link-local), fd:: (ULA)
SecRule REMOTE_ADDR "@rx ^(?:127|10|192\.168|172\.(?:1[6-9]|2[0-9]|3[0-1]))\.|^::1$|^[Ff][Ee]80:|^[Ff][Dd]" \
    "id:9600002,\
    phase:1,\
    nolog,\
    ctl:ruleRemoveById=9600010-9600999,\
    msg:'malcure_intrusion_prevention: 9600002 EXEMPT %{REMOTE_ADDR} private/loopback; rules 9600010-9600999 removed'"

# ================================================================================
# Configure / Initialize variables
# User-tunable knobs (override these in your site config, not here):
# 1. tx.mip_ec_expire_period      - seconds to track errors per IP (default 30)
# 2. tx.mip_error_limit           - errors before blocking triggers (default 5, blocks on 6th)
# 3. tx.mip_base_block_duration   - minimum block window in seconds (default 30)
# 4. tx.mip_block_penalty_per_hit - seconds added to block window per probe while blocked (default 2)
#
# Growth formula: block_window = tx.mip_base_block_duration + (blocked_hits × tx.mip_block_penalty_per_hit)
# An active scanner accumulates penalty without ceiling. Required silence = full current window.
SecAction \
    "id:9600010,\
    phase:1,\
    nolog,\
    ver:'malcure-intrusion-prevention-plugin/1.3.0',\
    setvar:tx.mip_ec_expire_period=30,\
    setvar:tx.mip_error_limit=5,\
    setvar:tx.mip_base_block_duration=30,\
    setvar:tx.mip_block_penalty_per_hit=2"


# Reset all expired state — fires for ANY IP whose tracking window has elapsed, whether
# or not it was ever blocked. This fixes the original bug where only blocked IPs were reset.
#
# Chain structure (IMPORTANT — do not move setvar:! to the outer rule):
# The ModSecurity reference manual states: "When used in a chain, [setvar] will be executed
# when an individual rule matches and not the entire chain." Placing setvar:! on the outer
# existence-guard rule would clear state on every request that simply has ip.mip_ec_expiry set,
# regardless of whether the expiry time has passed. The unsets MUST stay on the inner rule.
#
# Outer rule: existence guard — skips entirely for brand-new IPs where ip.mip_ec_expiry is unset.
# Inner rule: time check — unsets all tracking variables only when expiry has genuinely passed.
SecRule &IP:mip_ec_expiry "@eq 1" \
    "id:9600015,\
    phase:2,\
    log,\
    chain,\
    msg:'malcure_intrusion_prevention: 9600015 EXPIRE %{REMOTE_ADDR}; tracking window elapsed; ip.mip_error_counter/mip_block_ip/mip_block_penalty/mip_ec_expiry unset; TIME_EPOCH=%{TIME_EPOCH}'"
        SecRule IP:mip_ec_expiry "@lt %{TIME_EPOCH}" \
            "t:none,\
            setvar:!ip.mip_error_counter,\
            setvar:!ip.mip_block_ip,\
            setvar:!ip.mip_block_penalty,\
            setvar:!ip.mip_ec_expiry"

# Progressive linear backoff — accumulate ip.mip_block_penalty for every probe that arrives
# while the IP is already blocked. Runs before 9600020 so the updated penalty is used
# in that rule's expiry calculation. ip.mip_block_penalty persists in the IP collection and
# grows without ceiling. It is cleared by 9600015 when the IP finally goes quiet.
SecRule ip.mip_block_ip "@ge 1" \
    "id:9600016,\
    phase:2,\
    pass,\
    nolog,\
    setvar:'ip.mip_block_penalty=+%{tx.mip_block_penalty_per_hit}'"

# Early block in phase:2 — before the backend processes the request.
# The ip.mip_block_ip flag persists in the IP collection across requests, so once set
# by rule 9600040 (phase:3), every subsequent request from that IP is denied here
# in phase:2 without ever touching the upstream backend.
# This is the primary performance win: scanners get 403'd at the WAF, not at PHP.
#
# SLIDING WINDOW + PROGRESSIVE PENALTY: The block window grows with every blocked hit.
# window = tx.mip_base_block_duration + ip.mip_block_penalty
# ip.mip_block_penalty increases by tx.mip_block_penalty_per_hit (default 2s) per probe.
# The attacker must stop completely and wait out the full current window to get unblocked.
SecRule ip.mip_block_ip "@ge 1" \
    "id:9600020,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    setvar:'ip.mip_ec_expiry=%{TIME_EPOCH}',\
    setvar:'ip.mip_ec_expiry=+%{tx.mip_base_block_duration}',\
    setvar:'ip.mip_ec_expiry=+%{ip.mip_block_penalty}',\
    msg:'malcure_intrusion_prevention: 9600020 DENY %{REMOTE_ADDR} phase2-persistent-block; ip.mip_block_ip=%{ip.mip_block_ip}; ip.mip_error_counter=%{ip.mip_error_counter}; penalty=%{ip.mip_block_penalty}s; ip.mip_ec_expiry_pre=%{ip.mip_ec_expiry}; TIME_EPOCH=%{TIME_EPOCH}'"

# ================================================================================
# Track the number of errors
# This rule increments the error counter when a 403 or 404 response is detected.
# Actions:
# - 'setvar:'ip.mip_error_counter=+1'' increments the error counter for the IP.
# - 'setvar:'ip.mip_ec_expiry=%{TIME_EPOCH}'' sets 'ip.mip_ec_expiry' to the current time.
# - 'setvar:'ip.mip_ec_expiry=+%{tx.mip_ec_expire_period}'' adds the error counter expire period to 'ip.mip_ec_expiry'.
# This effectively updates the expiry time each time an error is encountered.
SecRule RESPONSE_STATUS "@within 403,404" \
    "id:9600030,\
    phase:3,\
    log,\
    setvar:'ip.mip_error_counter=+1',\
    setvar:'ip.mip_ec_expiry=%{TIME_EPOCH}',\
    setvar:'ip.mip_ec_expiry=+%{tx.mip_ec_expire_period}',\
    msg:'malcure_intrusion_prevention: 9600030 COUNT %{REMOTE_ADDR} status=%{RESPONSE_STATUS}; ip.mip_error_counter_pre=%{ip.mip_error_counter}; ip.mip_ec_expiry_pre=%{ip.mip_ec_expiry}; TIME_EPOCH=%{TIME_EPOCH}'"

# Set block flag if required
# This rule checks if the 'ip.mip_error_counter' exceeds the 'tx.mip_error_limit'.
# Condition:
# - If 'ip.mip_error_counter' is greater than 'tx.mip_error_limit' (e.g., more than 5 errors).
# Actions:
# - Sets 'ip.mip_block_ip' to 1, indicating that the IP should be blocked.
# This rule runs in phase 3, after the error counter has been incremented.
SecRule ip.mip_error_counter "@gt %{tx.mip_error_limit}" \
    "id:9600040,\
    phase:3,\
    log,\
    msg:'malcure_intrusion_prevention: 9600040 BLOCK %{REMOTE_ADDR} threshold crossed; ip.mip_error_counter=%{ip.mip_error_counter}; limit=%{tx.mip_error_limit}; ip.mip_ec_expiry=%{ip.mip_ec_expiry}; TIME_EPOCH=%{TIME_EPOCH}',\
    setvar:ip.mip_block_ip=1,\
    setvar:'ip.mip_ec_expiry=%{TIME_EPOCH}',\
    setvar:'ip.mip_ec_expiry=+%{tx.mip_base_block_duration}'"

# Block the threshold-crossing request in phase 3.
# The meaningful events are already logged by 9600040 (BLOCK) and 9600020 (DENY on
# subsequent requests), so this rule uses nolog to avoid duplicate error.log entries.
SecRule ip.mip_block_ip "@ge 1" \
    "id:9600050,\
    phase:3,\
    deny,\
    status:403,\
    nolog,\
    msg:'malcure_intrusion_prevention: 9600050 DENY %{REMOTE_ADDR} phase3-threshold-trip; ip.mip_error_counter=%{ip.mip_error_counter}; ip.mip_ec_expiry=%{ip.mip_ec_expiry}; TIME_EPOCH=%{TIME_EPOCH}'"

# The 'SecMarker' directive defines a marker in the ruleset.
# It can be used with actions like 'skipAfter' to control rule flow.
# In this case, it marks the end of the Malcure Intrusion Prevention Plugin rules.
SecMarker "END-MALCURE-INTRUSION-PREVENTION-9600000"

