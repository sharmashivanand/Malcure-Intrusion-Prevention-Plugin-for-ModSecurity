# Plugin name: malcure-wplogin-protection-plugin
# Plugin description: Limits requests to sensitive WordPress endpoints (wp-login.php, xmlrpc.php,
#   and any others configured via tx.wpl_endpoint_pattern) per IP to prevent brute-force and
#   credential stuffing attacks. Counts all requests regardless of HTTP method. Once an IP exceeds
#   the limit, all traffic from that IP is blocked with a progressive linear penalty that extends
#   the block window on each probe.
# Rule ID block base: 9,601,000 - 9,601,999
# Plugin version: 1.1.0

# ████████████████ IMPORTANT REQUIREMENTS!!! ████████████████
# ███ libModSecurity must support persistent storage of variables across transactions (--with-lmdb).
# ███ ENABLE_DEFAULT_COLLECTIONS must be set to 1. See coreruleset/crs-setup.conf.example Rule 900130
# ███ The plugin uses TIME_EPOCH for expiry since ModSecurity's expirevar is not reliable.
# ███ The plugin logs everything at SecDebugLogLevel 9.

# ================================================================================
# Disable the plugin
# The plugin is enabled by default when placed in the plugins folder.
# To disable it, uncomment the SecRule below.

# SecRule &tx.malcure-wplogin-protection-plugin "@eq 0" \
#     "id:9601001,\
#     phase:1,\
#     pass,\
#     nolog,\
#     ctl:ruleRemoveById=9601010-9601099,\
#     ver:'malcure-wplogin-protection-plugin/1.0.0',\
#     msg:'malcure_wplogin_protection: 9601001 Plugin disabled.'"

# ================================================================================
# Tunable configuration
# Override any of these values by adding an unconditional SecAction before the plugin
# loads (e.g., in your site vhost config or in modsecurity-setup.conf).
# Do NOT edit the defaults in malcure-wplogin-protection-before.conf directly.
#
# Variables:
#   tx.wpl_request_limit         — Number of requests to protected endpoints allowed per IP before
#                                   blocking triggers. A real user retries at most 2-3 times.
#                                   Default: 5
#
#   tx.wpl_window                — Tracking window in seconds. The request counter resets after this
#                                   many seconds of silence. If an IP makes one attempt every
#                                   tx.wpl_window+1 seconds it will never be blocked, so set this
#                                   high enough to catch slow brute-force attacks (default: 30).
#
#   tx.wpl_base_block_duration   — Minimum block duration in seconds from the moment the limit is
#                                   tripped. Extended by tx.wpl_block_penalty_per_hit for each
#                                   subsequent probe while blocked.
#                                   Default: 30
#
#   tx.wpl_block_penalty_per_hit — Seconds added to the block window for every request received
#                                   while the IP is blocked. Keeps persistent attackers locked out
#                                   without a ceiling.
#                                   Default: 2
#
#   tx.wpl_endpoint_pattern      — Regex matched against REQUEST_FILENAME to identify protected
#                                   endpoints. All HTTP methods are counted. Extend the pattern to
#                                   protect additional endpoints.
#                                   Default: (?:wp-login|xmlrpc)\.php$
#                                   Example to also protect wp-cron.php:
#                                   (?:wp-login|xmlrpc|wp-cron)\.php$

# Example: tighten to 3 attempts, 24-hour base block, 5-minute penalty per probe,
#          and also protect wp-cron.php
# SecAction \
#     "id:9601011,\
#     phase:1,\
#     nolog,\
#     pass,\
#     setvar:tx.wpl_request_limit=3,\
#     setvar:tx.wpl_window=30,\
#     setvar:tx.wpl_base_block_duration=86400,\
#     setvar:tx.wpl_block_penalty_per_hit=300,\
#     setvar:'tx.wpl_endpoint_pattern=(?:wp-login|xmlrpc|wp-cron)\.php$'"

