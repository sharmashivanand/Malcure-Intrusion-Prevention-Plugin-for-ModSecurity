# Plugin name: malcure-wplogin-protection-plugin
# Plugin description: Limits requests to sensitive WordPress endpoints (wp-login.php, xmlrpc.php,
#   and any others configured via tx.wpl_endpoint_pattern) per IP to prevent brute-force and
#   credential stuffing attacks. Counts all requests regardless of HTTP method. Once an IP exceeds
#   the limit, all traffic from that IP is blocked with a progressive linear penalty that extends
#   the block window on each probe.
# Rule ID block base: 9,601,000 - 9,601,999
# Plugin version: 1.1.0

# ================================================================================
# Exempt private and loopback IPs (IPv4 and IPv6)
# {Useful because WordPress Cron, health checks, and local services make requests
# from loopback/private addresses which must never be blocked.}
# IPv4 private ranges: 127.x, 10.x, 192.168.x, 172.16-31.x
# IPv6 private ranges: ::1 (loopback), fe80:: (link-local), fd:: (ULA)
SecRule REMOTE_ADDR "@rx ^(?:127|10|192\.168|172\.(?:1[6-9]|2[0-9]|3[0-1]))\.|^::1$|^[Ff][Ee]80:|^[Ff][Dd]" \
    "id:9601002,\
    phase:1,\
    nolog,\
    ctl:ruleRemoveById=9601010-9601099,\
    msg:'malcure_wplogin_protection: 9601002 EXEMPT %{REMOTE_ADDR} private/loopback; rules 9601010-9601099 removed'"

# ================================================================================
# Configure / Initialize variables
# User-tunable knobs (override these in your site config or malcure-wplogin-protection-config.conf):
# 1. tx.wpl_request_limit         - requests to protected endpoints allowed before blocking (default 5)
# 2. tx.wpl_window                - seconds to track requests per IP; resets after silence (default 30)
# 3. tx.wpl_base_block_duration   - minimum block window in seconds (default 30)
# 4. tx.wpl_block_penalty_per_hit - seconds added to block window per probe while blocked (default 2)
# 5. tx.wpl_endpoint_pattern      - regex matched against REQUEST_FILENAME; extend to add more endpoints
#
# Growth formula: block_window = tx.wpl_base_block_duration + (blocked_hits × tx.wpl_block_penalty_per_hit)
# A brute-force bot probing while blocked accumulates penalty without ceiling.
# Required silence = full current window before the IP is released.
SecAction \
    "id:9601010,\
    phase:1,\
    nolog,\
    ver:'malcure-wplogin-protection-plugin/1.1.0',\
    setvar:tx.wpl_request_limit=5,\
    setvar:tx.wpl_window=30,\
    setvar:tx.wpl_base_block_duration=30,\
    setvar:tx.wpl_block_penalty_per_hit=2,\
    setvar:'tx.wpl_endpoint_pattern=(?:wp-login|xmlrpc)\.php$'"

# ================================================================================
# Reset all expired state — fires for any IP whose tracking window has elapsed.
#
# Chain structure (IMPORTANT — do not move setvar:! to the outer rule):
# The ModSecurity reference manual states: "When used in a chain, [setvar] will be executed
# when an individual rule matches and not the entire chain." Placing setvar:! on the outer
# existence-guard rule would clear state on every request that simply has ip.wpl_ec_expiry set,
# regardless of whether the expiry time has passed. The unsets MUST stay on the inner rule.
#
# Outer rule: existence guard — skips entirely for brand-new IPs where ip.wpl_ec_expiry is unset.
# Inner rule: time check — unsets all tracking variables only when expiry has genuinely passed.
SecRule &IP:wpl_ec_expiry "@eq 1" \
    "id:9601015,\
    phase:2,\
    log,\
    chain,\
    msg:'malcure_wplogin_protection: 9601015 EXPIRE %{REMOTE_ADDR}; tracking window elapsed; ip.wpl_counter/block_ip/block_penalty/ec_expiry unset; TIME_EPOCH=%{TIME_EPOCH}'"
        SecRule IP:wpl_ec_expiry "@lt %{TIME_EPOCH}" \
            "t:none,\
            setvar:!ip.wpl_counter,\
            setvar:!ip.wpl_block_ip,\
            setvar:!ip.wpl_block_penalty,\
            setvar:!ip.wpl_ec_expiry"

# ================================================================================
# Progressive linear backoff — accumulate ip.wpl_block_penalty for every probe that
# arrives while the IP is already blocked. Runs before 9601020 so the updated penalty
# is used in that rule's expiry calculation. ip.wpl_block_penalty persists in the IP
# collection and grows without ceiling. Cleared by 9601015 when the IP finally goes quiet.
SecRule ip.wpl_block_ip "@ge 1" \
    "id:9601016,\
    phase:2,\
    pass,\
    nolog,\
    setvar:'ip.wpl_block_penalty=+%{tx.wpl_block_penalty_per_hit}'"

# ================================================================================
# Early block in phase:2 — before the backend processes the request.
# The ip.wpl_block_ip flag persists in the IP collection across requests, so once set
# by rule 9601040, every subsequent request from that IP is denied here in phase:2
# without ever touching the upstream backend.
#
# SLIDING WINDOW + PROGRESSIVE PENALTY: The block window grows with every blocked hit.
# window = tx.wpl_base_block_duration + ip.wpl_block_penalty
# ip.wpl_block_penalty increases by tx.wpl_block_penalty_per_hit (default 2s) per probe.
# The attacker must stop completely and wait out the full current window to get unblocked.
SecRule ip.wpl_block_ip "@ge 1" \
    "id:9601020,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    setvar:'ip.wpl_ec_expiry=%{TIME_EPOCH}',\
    setvar:'ip.wpl_ec_expiry=+%{tx.wpl_base_block_duration}',\
    setvar:'ip.wpl_ec_expiry=+%{ip.wpl_block_penalty}',\
    msg:'malcure_wplogin_protection: 9601020 DENY %{REMOTE_ADDR} phase2-persistent-block; ip.wpl_block_ip=%{ip.wpl_block_ip}; ip.wpl_counter=%{ip.wpl_counter}; penalty=%{ip.wpl_block_penalty}s; ip.wpl_ec_expiry_pre=%{ip.wpl_ec_expiry}; TIME_EPOCH=%{TIME_EPOCH}'"

# ================================================================================
# Count requests to protected endpoints
# All HTTP methods are counted (GET, POST, etc.) — xmlrpc.php is dangerous regardless of
# method, and bulk GET requests to wp-login.php are equally indicative of automated scanning.
# The tracked URL set is controlled by tx.wpl_endpoint_pattern (a regex on REQUEST_FILENAME).
# The tracking window (tx.wpl_window) resets on every matching request, so an IP that
# spaces attempts out stays tracked as long as it keeps hitting protected endpoints.
SecRule REQUEST_FILENAME "@rx %{tx.wpl_endpoint_pattern}" \
    "id:9601030,\
    phase:2,\
    pass,\
    log,\
    t:none,\
    setvar:'ip.wpl_counter=+1',\
    setvar:'ip.wpl_ec_expiry=%{TIME_EPOCH}',\
    setvar:'ip.wpl_ec_expiry=+%{tx.wpl_window}',\
    msg:'malcure_wplogin_protection: 9601030 COUNT %{REMOTE_ADDR} endpoint=%{REQUEST_FILENAME} method=%{REQUEST_METHOD}; ip.wpl_counter_pre=%{ip.wpl_counter}; ip.wpl_ec_expiry_pre=%{ip.wpl_ec_expiry}; TIME_EPOCH=%{TIME_EPOCH}'"

# ================================================================================
# Set block flag once the POST limit is exceeded.
# Also immediately overwrites ip.wpl_ec_expiry with the full block duration so that
# the IP cannot be released after only tx.wpl_window seconds — the block persists for
# at least tx.wpl_base_block_duration from this moment, extended further by 9601020
# for each subsequent probe.
SecRule ip.wpl_counter "@gt %{tx.wpl_request_limit}" \
    "id:9601040,\
    phase:2,\
    pass,\
    log,\
    msg:'malcure_wplogin_protection: 9601040 BLOCK %{REMOTE_ADDR} threshold crossed; ip.wpl_counter=%{ip.wpl_counter}; limit=%{tx.wpl_request_limit}; ip.wpl_ec_expiry_pre=%{ip.wpl_ec_expiry}; TIME_EPOCH=%{TIME_EPOCH}',\
    setvar:ip.wpl_block_ip=1,\
    setvar:'ip.wpl_ec_expiry=%{TIME_EPOCH}',\
    setvar:'ip.wpl_ec_expiry=+%{tx.wpl_base_block_duration}'"

# ================================================================================
# Block the very request that tripped the limit.
# By this point ip.wpl_block_ip has just been set to 1 by rule 9601040 in the same
# transaction. Future requests are caught earlier by rule 9601020 (phase:2 early block).
SecRule ip.wpl_block_ip "@ge 1" \
    "id:9601050,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'malcure_wplogin_protection: 9601050 DENY %{REMOTE_ADDR} phase2-threshold-trip; ip.wpl_counter=%{ip.wpl_counter}; ip.wpl_ec_expiry=%{ip.wpl_ec_expiry}; TIME_EPOCH=%{TIME_EPOCH}'"

SecMarker "END-MALCURE-WPLOGIN-PROTECTION-9601000"

